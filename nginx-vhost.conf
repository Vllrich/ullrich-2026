# This file documents the larsullrich-nginx container config (for reference).
# It is NOT deployed by the CI/CD pipeline.
# The container config lives in: larsullrich-nginx:/etc/nginx/conf.d/default.conf
# TLS certs are bind-mounted from /opt/larsullrich/ssl/ on the host.
# Cert renewal: managed separately on the host (Let's Encrypt, expires ~90 days).
#
# To inspect live config: docker exec larsullrich-nginx cat /etc/nginx/conf.d/default.conf
# To reload after manual changes: docker exec larsullrich-nginx nginx -s reload

upstream app {
    server ullrich-2026:80;
}

server {
    listen 80;
    server_name larsullrich.de www.larsullrich.de;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://larsullrich.de$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.larsullrich.de;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/private.key;

    return 301 https://larsullrich.de$request_uri;
}

server {
    listen 443 ssl http2;
    server_name larsullrich.de;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/private.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    location / {
        proxy_pass             http://app;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }
}
