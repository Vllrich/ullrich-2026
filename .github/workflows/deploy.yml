name: Deploy to Hetzner

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg PUBLIC_EMAILJS_PUBLIC_KEY=${{ secrets.PUBLIC_EMAILJS_PUBLIC_KEY }} \
            --build-arg PUBLIC_EMAILJS_SERVICE_ID=${{ secrets.PUBLIC_EMAILJS_SERVICE_ID }} \
            --build-arg PUBLIC_EMAILJS_TEMPLATE_ID=${{ secrets.PUBLIC_EMAILJS_TEMPLATE_ID }} \
            --build-arg PUBLIC_MAINTENANCE_MODE=${{ vars.PUBLIC_MAINTENANCE_MODE }} \
            -t ullrich-2026:latest .
          docker save ullrich-2026:latest | gzip > website.tar.gz

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          source: "website.tar.gz,docker-compose.prod.yml,nginx-vhost.conf"
          target: "/opt/ullrich-2026"
          timeout: 60s
          command_timeout: 10m

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script: |
            cd /opt/ullrich-2026
            docker load < website.tar.gz
            cp docker-compose.prod.yml docker-compose.yml
            docker compose down --remove-orphans
            docker compose up -d

            # Connect to the larsullrich nginx network so it can proxy to us
            sleep 3
            docker network connect larsullrich_default ullrich-2026 || true

            # Update nginx upstream to point to our container and reload
            docker exec larsullrich-nginx sh -c \
              "sed -i 's|server app:3000|server ullrich-2026:80|g' /etc/nginx/conf.d/default.conf; \
               sed -i 's|server ullrich-2026:80.*|server ullrich-2026:80;|g' /etc/nginx/conf.d/default.conf; \
               nginx -t && nginx -s reload"

            docker system prune -f

            sleep 5
            docker compose ps
