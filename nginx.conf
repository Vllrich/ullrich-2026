server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers live on the reverse proxy (nginx-vhost.conf), which is the
    # only internet-facing layer (this container is bound to 127.0.0.1 on the
    # host). Keeping them in one place avoids duplicate headers.

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json application/ld+json image/svg+xml image/webp font/woff2 text/xml;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
