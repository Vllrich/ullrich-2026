# This file documents the larsullrich-nginx reverse-proxy container config (for reference).
# It is NOT deployed by the CI/CD pipeline; the proxy is managed separately via
# /opt/larsullrich/proxy/docker-compose.yml on the host.
#
# TLS: Cloudflare Origin Certificate (15-year validity, issued in the Cloudflare
# dashboard under SSL/TLS -> Origin Server -> Create Certificate). Requires
# Cloudflare SSL/TLS mode "Full (strict)" on the zone. Cert + key are bind-mounted
# from /opt/larsullrich/ssl/ on the host.
#
# To inspect live config: docker exec larsullrich-nginx cat /etc/nginx/conf.d/default.conf
# To reload after manual changes: docker exec larsullrich-nginx nginx -s reload

# Docker's embedded DNS (127.0.0.11) resolves the app container by name at
# request time, so the proxy doesn't crash on startup if the app container
# isn't up yet (e.g. during first provisioning, before CI/CD has deployed it).
resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name larsullrich.de www.larsullrich.de;
    return 301 https://larsullrich.de$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.larsullrich.de;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/private.key;

    return 301 https://larsullrich.de$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name larsullrich.de;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/private.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://api.emailjs.com https://cloudflareinsights.com; frame-ancestors 'none';" always;
    # Lets us verify from outside which origin box served a request, without SSH access.
    add_header X-Served-By               "netcup-prod" always;

    location / {
        set $upstream_app      ullrich-2026;
        proxy_pass             http://$upstream_app:80;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }
}
