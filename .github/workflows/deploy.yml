name: Deploy to Hetzner

on:
  push:
    branches: [ master ]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx astro check

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg PUBLIC_EMAILJS_PUBLIC_KEY=${{ secrets.PUBLIC_EMAILJS_PUBLIC_KEY }} \
            --build-arg PUBLIC_EMAILJS_SERVICE_ID=${{ secrets.PUBLIC_EMAILJS_SERVICE_ID }} \
            --build-arg PUBLIC_EMAILJS_TEMPLATE_ID=${{ secrets.PUBLIC_EMAILJS_TEMPLATE_ID }} \
            --build-arg PUBLIC_MAINTENANCE_MODE=${{ vars.PUBLIC_MAINTENANCE_MODE }} \
            -t ullrich-2026:latest .
          docker save ullrich-2026:latest | gzip > website.tar.gz

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          # Requires a 'deploy' user on the server with docker group access and ownership of /opt/ullrich-2026
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          source: "website.tar.gz,docker-compose.prod.yml"
          target: "/opt/ullrich-2026"
          timeout: 60s
          command_timeout: 10m

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          # Requires a 'deploy' user on the server with docker group access and ownership of /opt/ullrich-2026
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script: |
            cd /opt/ullrich-2026

            # Keep previous image for rollback
            docker tag ullrich-2026:latest ullrich-2026:previous 2>/dev/null || true

            # Load and start new image (no compose down — minimises downtime)
            docker load < website.tar.gz
            cp docker-compose.prod.yml docker-compose.yml
            docker compose up -d --remove-orphans

            # Ensure container is on the proxy network
            sleep 3
            docker network connect larsullrich_default ullrich-2026 2>/dev/null || true

            # Prune only dangling images (not all unused) to preserve :previous
            docker image prune -f

            docker compose ps

      - name: Health check
        run: |
          sleep 15
          curl -sf https://larsullrich.de/ -o /dev/null \
            && echo "Health check passed" \
            || echo "WARNING: Health check did not return 200 — verify manually"
